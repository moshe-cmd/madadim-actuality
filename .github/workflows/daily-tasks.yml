name: Daily Task Reminder

on:
  schedule:
    # 06:00 UTC = 08:00 Israel (winter) / 09:00 Israel (summer DST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send-daily-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send daily task reminder to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/daily-tasks.js
